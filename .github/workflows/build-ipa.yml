name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build project
      run: |
        xcodebuild -project AutoClicker/AutoClicker.xcodeproj -scheme AutoClicker -configuration Release -archivePath build/AutoClicker.xcarchive archive
        mkdir -p output
        xcodebuild -exportArchive -archivePath build/AutoClicker.xcarchive -exportPath output -exportOptionsPlist .github/ExportOptions.plist

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoClicker-ipa
        path: output/AutoClicker.ipa
