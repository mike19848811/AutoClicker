name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build IPA
      uses: ios-bootcamp/ios-build-ipa-action@v2
      with:
        project-path: AutoClicker/AutoClicker.xcodeproj
        scheme: AutoClicker
        configuration: Release
        output-path: AutoClicker.ipa

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoClicker-ipa
        path: AutoClicker.ipa
